name: Maintenance Closeout

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional date in YYYY-MM-DD
        required: false
        type: string
      max_stale_days:
        description: Optional stale threshold in days
        required: false
        type: string
  schedule:
    - cron: "45 14 * * *"

permissions:
  contents: write

jobs:
  maintenance-closeout:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x scripts/sync-status-overview.sh
          chmod +x scripts/check-maintenance-health.sh
          chmod +x scripts/run-maintenance-closeout.sh
          chmod +x scripts/update-maintenance-dashboard.sh
          chmod +x scripts/update-ops-summary.sh

      - name: Run closeout and capture report
        env:
          TARGET_DATE: ${{ inputs.target_date }}
          MAX_STALE_DAYS: ${{ inputs.max_stale_days }}
          TZ: Asia/Shanghai
        run: |
          if [ -z "${TARGET_DATE}" ]; then
            TARGET_DATE="$(date +%F)"
          fi

          if [ -z "${MAX_STALE_DAYS}" ]; then
            MAX_STALE_DAYS="3"
          fi

          set +e
          ./scripts/run-maintenance-closeout.sh "${TARGET_DATE}" --max-stale-days "${MAX_STALE_DAYS}" --strict > maintenance-closeout-report.md
          exit_code=$?
          set -e

          cat maintenance-closeout-report.md >> "$GITHUB_STEP_SUMMARY"
          echo "exit_code=${exit_code}" >> "$GITHUB_ENV"

      - name: Refresh ops summary
        env:
          TARGET_DATE: ${{ inputs.target_date }}
          MAX_STALE_DAYS: ${{ inputs.max_stale_days }}
          TZ: Asia/Shanghai
        run: |
          if [ -z "${TARGET_DATE}" ]; then
            TARGET_DATE="$(date +%F)"
          fi

          if [ -z "${MAX_STALE_DAYS}" ]; then
            MAX_STALE_DAYS="3"
          fi

          ./scripts/update-ops-summary.sh "${TARGET_DATE}" --max-stale-days "${MAX_STALE_DAYS}"

      - name: Commit synced summary if changed
        run: |
          git add docs/recommendations/airport-guide-2026.md research/maintenance-dashboard.md research/ops-today.md

          if git diff --cached --quiet; then
            echo "No synced overview changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: closeout sync maintenance dashboard"
          git push

      - name: Fail if closeout found issues
        run: |
          if [ "${exit_code}" -ne 0 ]; then
            exit "${exit_code}"
          fi
