workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - maintenance

default:
  image: alpine:3.20
  before_script:
    - apk add --no-cache git coreutils tzdata
    - export TZ=Asia/Shanghai
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "gitlab-ci-bot@users.noreply.gitlab.com"
    - git checkout -B "$CI_COMMIT_REF_NAME"
    - chmod +x scripts/*.sh

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  MAINTENANCE_TASK: "daily"
  MAX_STALE_DAYS: "3"

daily-maintenance-refresh:
  stage: maintenance
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $MAINTENANCE_TASK == "daily"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $MAINTENANCE_TASK == "daily"'
  script:
    - ./scripts/run-gitlab-maintenance-task.sh daily

weekly-summary-refresh:
  stage: maintenance
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $MAINTENANCE_TASK == "weekly"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $MAINTENANCE_TASK == "weekly"'
  script:
    - ./scripts/run-gitlab-maintenance-task.sh weekly

status-overview-sync:
  stage: maintenance
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $MAINTENANCE_TASK == "sync"'
  script:
    - ./scripts/run-gitlab-maintenance-task.sh sync

maintenance-closeout:
  stage: maintenance
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $MAINTENANCE_TASK == "closeout"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $MAINTENANCE_TASK == "closeout"'
  script:
    - ./scripts/run-gitlab-maintenance-task.sh closeout
  artifacts:
    when: always
    paths:
      - maintenance-closeout-report.md
    expire_in: 14 days
