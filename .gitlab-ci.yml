spec:
  inputs:
    maintenance-task:
      description: "Select which maintenance task this schedule should run."
      options:
        - daily
        - weekly
        - sync
        - closeout
      default: daily
    target-date:
      description: "Optional date in YYYY-MM-DD. Leave empty to use today's Asia/Shanghai date."
      default: ""
    max-stale-days:
      description: "How many days a candidate can go without review before being marked stale."
      default: "3"
---
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - maintenance

default:
  image: alpine:3.20
  before_script:
    - apk add --no-cache git coreutils tzdata
    - export TZ=Asia/Shanghai
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "gitlab-ci-bot@users.noreply.gitlab.com"
    - git checkout -B "$CI_COMMIT_REF_NAME"
    - chmod +x scripts/*.sh

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"

scheduled-maintenance:
  stage: maintenance
  script:
    - export MAINTENANCE_TASK='$[[ inputs.maintenance-task ]]'
    - export TARGET_DATE='$[[ inputs.target-date ]]'
    - export MAX_STALE_DAYS='$[[ inputs.max-stale-days ]]'
    - ./scripts/run-gitlab-maintenance-task.sh "$MAINTENANCE_TASK"
