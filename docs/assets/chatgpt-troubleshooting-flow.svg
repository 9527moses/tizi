<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT 访问问题排查图</title>
  <desc id="desc">通过决策树帮助用户从换节点、换地区、检查浏览器和代理模式开始排查 ChatGPT 无法访问的问题。</desc>
  <style>
    .bg { fill: #f6f8fb; }
    .card { fill: #ffffff; stroke: #d5ddea; stroke-width: 2; }
    .green { fill: #edf8f0; stroke: #87ba96; }
    .blue { fill: #eef4ff; stroke: #8cb0e8; }
    .orange { fill: #fff5e7; stroke: #dfb565; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #172033; }
    .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #52607a; }
    .step { font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #172033; }
    .body { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #334155; }
    .line { stroke: #8ca0bf; stroke-width: 5; stroke-linecap: round; fill: none; }
  </style>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <text class="title" x="80" y="92">ChatGPT 无法访问时，先看这张图</text>
  <text class="subtitle" x="80" y="127">多数问题不是设置太复杂，而是线路、地区、浏览器状态没先排掉</text>

  <g transform="translate(430 160)">
    <rect class="card orange" x="0" y="0" width="340" height="110" rx="24"/>
    <text class="step" x="36" y="66">ChatGPT 打不开或一直转圈</text>
  </g>

  <path class="line" d="M600 270 V330"/>
  <polygon points="600,330 585,300 615,300" fill="#8ca0bf"/>

  <g transform="translate(120 350)">
    <rect class="card green" x="0" y="0" width="280" height="130" rx="24"/>
    <text class="step" x="28" y="58">先换节点</text>
    <text class="body" x="28" y="92">不要只盯一个节点反复试</text>
  </g>

  <g transform="translate(460 350)">
    <rect class="card blue" x="0" y="0" width="280" height="130" rx="24"/>
    <text class="step" x="28" y="58">再换地区</text>
    <text class="body" x="28" y="92">日本 新加坡 美国交叉测试</text>
  </g>

  <g transform="translate(800 350)">
    <rect class="card green" x="0" y="0" width="280" height="130" rx="24"/>
    <text class="step" x="28" y="58">浏览器交叉验证</text>
    <text class="body" x="28" y="92">无痕窗口或换浏览器试</text>
  </g>

  <path class="line" d="M400 415 H460"/>
  <polygon points="460,415 430,400 430,430" fill="#8ca0bf"/>
  <path class="line" d="M740 415 H800"/>
  <polygon points="800,415 770,400 770,430" fill="#8ca0bf"/>

  <path class="line" d="M260 480 V560 H920 V480"/>

  <g transform="translate(260 560)">
    <rect class="card" x="0" y="0" width="660" height="120" rx="24"/>
    <text class="step" x="34" y="54">如果还是不行</text>
    <text class="body" x="34" y="90">更新订阅 → 重启客户端 → 检查系统代理或 TUN 模式 → 再测目标网站</text>
  </g>
</svg>
