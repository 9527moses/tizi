<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Windows 客户端使用流程图</title>
  <desc id="desc">展示 Windows 用户从下载安装到导入订阅、打开系统代理、测试目标网站和排查问题的完整流程。</desc>
  <style>
    .bg { fill: #f5f7fc; }
    .card { fill: #ffffff; stroke: #d5ddea; stroke-width: 2; }
    .green { fill: #edf8f0; stroke: #87ba96; }
    .blue { fill: #eef4ff; stroke: #8cb0e8; }
    .orange { fill: #fff5e7; stroke: #dfb565; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #172033; }
    .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #52607a; }
    .step { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #172033; }
    .body { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #334155; }
    .line { stroke: #8ca0bf; stroke-width: 5; stroke-linecap: round; fill: none; }
    .badge { fill: #172033; }
    .badgeText { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #ffffff; }
  </style>

  <rect class="bg" width="1200" height="760" rx="24"/>
  <text class="title" x="80" y="92">Windows 新手使用流程</text>
  <text class="subtitle" x="80" y="127">下载安装 → 导入订阅 → 开系统代理或 TUN → 选节点 → 测试与排查</text>

  <g transform="translate(80 170)">
    <rect class="card green" x="0" y="0" width="210" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">1</text>
    <text class="step" x="24" y="78">下载安装</text>
    <text class="body" x="24" y="112">优先用官方或服务方</text>
    <text class="body" x="24" y="138">推荐版本</text>
  </g>

  <g transform="translate(320 170)">
    <rect class="card blue" x="0" y="0" width="210" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">2</text>
    <text class="step" x="24" y="78">导入订阅</text>
    <text class="body" x="24" y="112">确认节点列表</text>
    <text class="body" x="24" y="138">已经加载出来</text>
  </g>

  <g transform="translate(560 170)">
    <rect class="card orange" x="0" y="0" width="210" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">3</text>
    <text class="step" x="24" y="78">打开代理模式</text>
    <text class="body" x="24" y="112">系统代理或 TUN</text>
    <text class="body" x="24" y="138">按推荐方案开启</text>
  </g>

  <g transform="translate(800 170)">
    <rect class="card blue" x="0" y="0" width="210" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">4</text>
    <text class="step" x="24" y="78">选择节点</text>
    <text class="body" x="24" y="112">先选常用地区</text>
    <text class="body" x="24" y="138">不要先改高级项</text>
  </g>

  <path class="line" d="M290 255 H320"/>
  <polygon points="320,255 290,240 290,270" fill="#8ca0bf"/>
  <path class="line" d="M530 255 H560"/>
  <polygon points="560,255 530,240 530,270" fill="#8ca0bf"/>
  <path class="line" d="M770 255 H800"/>
  <polygon points="800,255 770,240 770,270" fill="#8ca0bf"/>

  <g transform="translate(220 430)">
    <rect class="card green" x="0" y="0" width="320" height="150" rx="24"/>
    <circle class="badge" cx="34" cy="34" r="18"/>
    <text class="badgeText" x="28" y="41">5</text>
    <text class="step" x="28" y="82">测试目标网站</text>
    <text class="body" x="28" y="116">直接打开 ChatGPT、YouTube 或常用站点</text>
  </g>

  <g transform="translate(650 430)">
    <rect class="card" x="0" y="0" width="320" height="150" rx="24"/>
    <circle class="badge" cx="34" cy="34" r="18"/>
    <text class="badgeText" x="28" y="41">6</text>
    <text class="step" x="28" y="82">排查问题</text>
    <text class="body" x="28" y="116">更新订阅 → 换节点 → 查代理模式 → 重开软件</text>
  </g>

  <path class="line" d="M905 340 V385 H810"/>
  <polygon points="810,385 840,370 840,400" fill="#8ca0bf"/>
  <path class="line" d="M540 505 H650"/>
  <polygon points="650,505 620,490 620,520" fill="#8ca0bf"/>
</svg>
