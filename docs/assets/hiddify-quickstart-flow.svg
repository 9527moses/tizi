<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hiddify 新手使用流程图</title>
  <desc id="desc">从安装客户端到导入订阅、选择节点、验证连接和问题排查的五步流程。</desc>
  <style>
    .bg { fill: #f6f8fb; }
    .card { fill: #ffffff; stroke: #d7dee7; stroke-width: 2; }
    .accent { fill: #e9f6ef; stroke: #7bb98f; }
    .warn { fill: #fff6e8; stroke: #e3b766; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #172033; }
    .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #52607a; }
    .step { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #172033; }
    .body { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #334155; }
    .small { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #52607a; }
    .line { stroke: #90a0b7; stroke-width: 5; stroke-linecap: round; }
    .badge { fill: #172033; }
    .badgeText { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; fill: #ffffff; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="720" rx="24"/>
  <text class="title" x="80" y="90">Hiddify 新手使用流程</text>
  <text class="subtitle" x="80" y="125">先跑通最小闭环：安装 → 导入 → 选节点 → 测试 → 排查</text>

  <line class="line" x1="220" y1="250" x2="980" y2="250"/>
  <polygon points="980,250 950,235 950,265" fill="#90a0b7"/>

  <g transform="translate(80 170)">
    <rect class="card accent" x="0" y="0" width="180" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">1</text>
    <text class="step" x="24" y="78">安装客户端</text>
    <text class="body" x="24" y="112">先用兼容版本</text>
    <text class="body" x="24" y="138">不要一开始换太多工具</text>
  </g>

  <g transform="translate(290 170)">
    <rect class="card" x="0" y="0" width="180" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">2</text>
    <text class="step" x="24" y="78">导入订阅</text>
    <text class="body" x="24" y="112">复制完整链接</text>
    <text class="body" x="24" y="138">等节点列表加载完成</text>
  </g>

  <g transform="translate(500 170)">
    <rect class="card" x="0" y="0" width="180" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">3</text>
    <text class="step" x="24" y="78">选择节点</text>
    <text class="body" x="24" y="112">先测常用地区</text>
    <text class="body" x="24" y="138">日本 新加坡 香港 美国</text>
  </g>

  <g transform="translate(710 170)">
    <rect class="card" x="0" y="0" width="180" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">4</text>
    <text class="step" x="24" y="78">打开连接</text>
    <text class="body" x="24" y="112">直接访问目标网站</text>
    <text class="body" x="24" y="138">不要只看测速数字</text>
  </g>

  <g transform="translate(920 170)">
    <rect class="card warn" x="0" y="0" width="180" height="170" rx="22"/>
    <circle class="badge" cx="30" cy="30" r="18"/>
    <text class="badgeText" x="24" y="37">5</text>
    <text class="step" x="24" y="78">问题排查</text>
    <text class="body" x="24" y="112">更新订阅 → 换节点</text>
    <text class="body" x="24" y="138">换地区 → 查代理模式</text>
  </g>

  <rect class="card" x="80" y="410" width="1040" height="220" rx="24"/>
  <text class="step" x="120" y="470">新手最容易踩的坑</text>
  <text class="body" x="120" y="515">只看延迟，不看实际能不能打开网站</text>
  <text class="body" x="120" y="550">一个节点不行就怀疑整个服务，实际上应该先换同地区再换地区</text>
  <text class="body" x="120" y="585">一开始就改高级设置，反而把原本能用的配置改乱</text>
  <text class="small" x="120" y="620">这张图适合放在教程前半段，先帮用户建立整体顺序。</text>
</svg>
